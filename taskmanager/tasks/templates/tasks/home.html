<!DOCTYPE html>
<html>
<head>

<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Task Manager</h2>

<div class="card p-4 shadow">

<form method="POST">

{% csrf_token %}

<input type="text" name="title" class="form-control mb-3" placeholder="Task Title" required>

<textarea name="description" class="form-control mb-3" placeholder="Task Description"></textarea>

<button class="btn btn-primary">Add Task</button>

</form>

</div>

<h3 class="mt-5">All Tasks</h3>

<table class="table table-bordered mt-3">

<tr>
<th>Title</th>
<th>Description</th>
<th>Status</th>
</tr>

{% for task in tasks %}

<tr>

<td>{{ task.title }}</td>
<td>{{ task.description }}</td>
<td>{{ task.status }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
